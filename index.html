<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>꿈나무 용돈기입장</title>
    <style>
        :root { --primary: #4a90e2; --income: #2ecc71; --expense: #e74c3c; --bank: #f1c40f; --bg: #fdfbff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nanum Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 8px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 12px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .user-section { text-align: center; margin-bottom: 8px; }
        /* 이름 입력란 삭제에 따른 스타일 수정 */
        h2 { color: #333; margin: 10px 0; font-size: 17px; }
        #nameTrigger { cursor: pointer; user-select: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .dash-box { background: #fff; padding: 8px; border-radius: 12px; border: 1px solid #eee; text-align: center; cursor: pointer; user-select: none; }
        .dash-box.bank { border: 2px solid var(--bank); background: #fffdf5; }
        .dash-box.wallet { border: 2px solid var(--primary); background: #f5faff; }
        .label { font-size: 10px; color: #666; display: block; margin-bottom: 2px; font-weight: bold; }
        .value { font-weight: 800; font-size: 13px; display: block; }
        .calendar-header { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 8px; width: 100%; }
        .calendar-header h3 { font-size: 14px; margin: 0; white-space: nowrap; flex-shrink: 0; }
        .calendar-header button { padding: 4px 8px; font-size: 10px; background: #eee; color: #333; border-radius: 6px; border: none; cursor: pointer; min-width: 30px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; border: 1px solid #eee; background: #eee; border-radius: 10px; overflow: hidden; }
        .day-head { background: #f1f1f1; padding: 4px; text-align: center; font-size: 9px; font-weight: bold; }
        .day { background: white; min-height: 48px; padding: 2px; font-size: 8px; cursor: pointer; position: relative; }
        .day.today { background: #fff9e6; }
        .day-num { font-weight: bold; color: #333; font-size: 9px; }
        .cal-inc, .cal-exp, .cal-bnk { font-size: 7px; font-weight: bold; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cal-inc { color: var(--income); }
        .cal-exp { color: var(--expense); }
        .cal-bnk { color: #d4ac0d; }
        .month-stats { background: #f9f9f9; padding: 8px; border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; font-size: 9px; margin: 8px 0; border: 1px solid #eee; gap: 5px; }
        .stat-item b { display: block; font-size: 10px; margin-top: 2px; }
        .input-group { background: #f8f9fa; padding: 10px; border-radius: 15px; border: 1px solid #eee; margin-top: 10px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
        input, select, button { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 12px; outline: none; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .detail-view { margin-top: 10px; display: none; background: #fff; border: 2px solid #ddd; padding: 10px; border-radius: 15px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 11px; }
        .tag { padding: 1px 5px; border-radius: 4px; color: white; font-size: 9px; margin-right: 4px; font-weight: bold; }
        .del-btn { background: #ffeded; color: #e74c3c; border: 1px solid #ffd1d1; padding: 2px 6px; font-size: 10px; border-radius: 4px; cursor: pointer; width: auto !important; margin-left: 8px; }
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 280px; text-align: center; }
        .bank-option-btn { padding: 10px; margin: 5px 0; width: 100%; border-radius: 10px; border: 1px solid #ddd; background: #fff; font-size: 14px; font-weight: bold; color: #333; cursor: pointer; }
    </style>
</head>
<body>
<div id="customModal"><div class="modal-content" id="modalBody"></div></div>
<div class="container">
    <div class="user-section">
        <h2 id="appTitle">비밀 금고 <span id="nameTrigger" ontouchstart="startNameTimer()" ontouchend="endNameTimer()" onmousedown="startNameTimer()" onmouseup="endNameTimer()">💰</span></h2>
    </div>
    <div class="dashboard">
        <div class="dash-box bank" ontouchstart="startTimer()" ontouchend="endTimer()" onmousedown="startTimer()" onmouseup="endTimer()">
            <span class="label">🏦 아빠 금고</span>
            <span class="value bank-val" id="bankBalance">0원</span>
        </div>
        <div class="dash-box wallet">
            <span class="label">💵 남은 용돈</span>
            <span class="value balance-val" id="totalBalance">0원</span>
        </div>
    </div>
    <div class="calendar-header">
        <button onclick="changeMonth(-1)">◀</button>
        <h3 id="currentMonthStr">2026년 3월</h3>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendar"></div>
    <div class="month-stats">
        <div class="stat-item" style="color:var(--income)">📈 수입<b id="mTotalInc">0</b></div>
        <div class="stat-item" style="color:var(--expense)">📉 지출<b id="mTotalExp">0</b></div>
        <div class="stat-item" style="color:#d4ac0d">🏦 저축<b id="mTotalBnk">0</b></div>
    </div>
    <div id="detailView" class="detail-view">
        <h4 id="selectedDateStr" style="margin:0 0 8px 0; font-size: 12px;">📍 날짜 상세</h4>
        <div id="dayList"></div>
    </div>
    <div class="input-group">
        <div class="input-row">
            <input type="date" id="date">
            <select id="type">
                <option value="expense">📉 (지출) 나간 돈</option>
                <option value="income">📈 (수입) 들어온 돈</option>
                <option value="tobank">🏦 (금고) 보관한 돈</option>
            </select>
        </div>
        <div class="input-row">
            <input type="text" id="memo" placeholder="무엇을 했나요?">
            <input type="number" id="amount" placeholder="얼마인가요?">
        </div>
        <button onclick="addRecord()">기록하기</button>
    </div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('moneyRecords')) || [];
    let viewDate = new Date();
    let timer, nameTimer;

    function getBalances() {
        let wallet = 0, bank = 0;
        records.forEach(r => {
            if(r.type === 'income') wallet += r.amount; 
            else if(r.type === 'expense') wallet -= r.amount;
            else if(r.type === 'tobank') { wallet -= r.amount; bank += r.amount; }
            else if(r.type === 'frombank') { wallet += r.amount; bank -= r.amount; }
            else if(r.type === 'direct_in') bank += r.amount;
        });
        return { wallet, bank };
    }

    function showModal(msg, isAction = false, actionHtml = '') {
        const body = document.getElementById('modalBody');
        if(!isAction) {
            body.innerHTML = `<p style="font-weight:bold; color:#333; font-size:14px;">${msg}</p><button onclick="closeModal()" style="background:var(--primary); color:white; padding:8px; border:none; border-radius:8px; width:100%; cursor:pointer; font-size:13px;">확인</button>`;
        } else { body.innerHTML = actionHtml; }
        document.getElementById('customModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    // 이름 변경용 타이머
    function startNameTimer() {
        nameTimer = setTimeout(() => {
            const currentName = localStorage.getItem('childName') || "";
            const newName = prompt("금고 주인의 이름을 입력하세요:", currentName);
            if (newName !== null) {
                localStorage.setItem('childName', newName);
                render();
            }
        }, 3000); // 3초
    }
    function endNameTimer() { clearTimeout(nameTimer); }

    function startTimer() {
        timer = setTimeout(() => {
            const html = `<h3 style="margin-top:0; color:#333; font-size:16px;">🏦 금고 관리</h3>
                <button class="bank-option-btn" onclick="handleBankAction('direct_in')">💰 입금</button>
                <button class="bank-option-btn" onclick="handleBankAction('withdraw')">💸 출금</button>
                <button onclick="closeModal()" style="background:#eee; color:#333; padding:8px; border:none; border-radius:8px; width:100%; margin-top:8px; cursor:pointer; font-size:12px;">닫기</button>`;
            showModal('', true, html);
        }, 1000);
    }
    function endTimer() { clearTimeout(timer); }

    function handleBankAction(actionType) {
        closeModal();
        setTimeout(() => {
            const amountStr = prompt(actionType === 'direct_in' ? "금고에 얼마를 넣을까요?" : "금고에서 얼마를 꺼낼까요?");
            if(!amountStr || isNaN(amountStr)) return;
            const val = parseInt(amountStr);
            const today = new Date().toISOString().split('T')[0];
            const current = getBalances();
            if(actionType === 'withdraw') {
                if(val > current.bank) return showModal("금고에 돈이 부족해요! 🏦❌");
                records.push({ id: Date.now(), date: today, type: 'frombank', memo: '금고에서 꺼냄', amount: val });
            } else {
                records.push({ id: Date.now(), date: today, type: 'direct_in', memo: '금고에 바로 저금', amount: val });
            }
            saveAndRender();
            showDetail(today);
        }, 100);
    }

    function addRecord() {
        const date = document.getElementById('date').value;
        const type = document.getElementById('type').value;
        const memo = document.getElementById('memo').value;
        const amountStr = document.getElementById('amount').value;
        const amount = parseInt(amountStr);
        if(!date || !memo || isNaN(amount)) return showModal("내용을 모두 적어주세요!");
        
        const current = getBalances();
        if((type === 'expense' || type === 'tobank') && amount > current.wallet) {
            return showModal(`남은 용돈이 부족해요! 💸❌<br>(현재 잔액: ${current.wallet.toLocaleString()}원)`);
        }

        records.push({ id: Date.now(), date, type, memo, amount });
        saveAndRender();
        showDetail(date);
        document.getElementById('memo').value = ""; 
        document.getElementById('amount').value = "";
    }

    function deleteRecord(id) {
        if(confirm("이 내역을 삭제할까요?")) {
            const currentDate = document.getElementById('date').value;
            records = records.filter(r => r.id !== id);
            saveAndRender();
            showDetail(currentDate);
        }
    }

    function saveAndRender() {
        localStorage.setItem('moneyRecords', JSON.stringify(records));
        render();
    }

    function showDetail(dateStr) {
        document.getElementById('date').value = dateStr;
        const dayRecords = records.filter(r => r.date === dateStr);
        const detailView = document.getElementById('detailView');
        const dayList = document.getElementById('dayList');
        detailView.style.display = 'block';
        document.getElementById('selectedDateStr').innerText = "📍 " + dateStr;
        dayList.innerHTML = dayRecords.length ? "" : "<p style='font-size:10px; color:#999'>내역 없음</p>";
        dayRecords.forEach(r => {
            let label = (r.type === 'income' || r.type === 'frombank') ? "수입" : (r.type === 'expense' ? "지출" : "금고");
            let color = (r.type === 'income' || r.type === 'frombank') ? "var(--income)" : (r.type === 'expense' ? "var(--expense)" : "#d4ac0d");
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span><span class="tag" style="background:${color}">${label}</span><b>${r.memo}</b></span>
                <div style="display:flex; align-items:center;"><b style="color:${color}">${r.amount.toLocaleString()}원</b><button class="del-btn" onclick="deleteRecord(${r.id})">X</button></div>`;
            dayList.appendChild(div);
        });
    }

    function changeMonth(val) { viewDate.setMonth(viewDate.getMonth() + val); render(); }

    function render() {
        const name = localStorage.getItem('childName');
        const appTitle = document.getElementById('appTitle');
        if(name) { 
            appTitle.innerHTML = `${name}의 비밀 금고 <span id="nameTrigger" ontouchstart="startNameTimer()" ontouchend="endNameTimer()" onmousedown="startNameTimer()" onmouseup="endNameTimer()">💰</span>`;
        } else {
            appTitle.innerHTML = `비밀 금고 <span id="nameTrigger" ontouchstart="startNameTimer()" ontouchend="endNameTimer()" onmousedown="startNameTimer()" onmouseup="endNameTimer()">💰</span>`;
        }
        
        const year = viewDate.getFullYear(), month = viewDate.getMonth();
        document.getElementById('currentMonthStr').innerText = `${year}년 ${month + 1}월`;
        const first = new Date(year, month, 1).getDay(), last = new Date(year, month + 1, 0).getDate();
        const cal = document.getElementById('calendar'); cal.innerHTML = "";
        ['일','월','화','수','목','금','토'].forEach(d => { const h=document.createElement('div'); h.className='day-head'; h.innerText=d; cal.appendChild(h); });
        for(let i=0; i<first; i++) cal.appendChild(document.createElement('div')).className='day';
        
        let current = getBalances();
        let mInc = 0, mExp = 0, mBnk = 0;
        
        for(let d=1; d<=last; d++) {
            const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day' + (dStr === new Date().toISOString().split('T')[0] ? ' today' : '');
            dayDiv.onclick = () => showDetail(dStr);
            let dInc=0, dExp=0, dBankSum=0;
            records.filter(r => r.date === dStr).forEach(r => {
                if(r.type === 'income' || r.type === 'frombank') dInc += r.amount; 
                else if(r.type === 'expense') dExp += r.amount;
                else if(r.type === 'tobank' || r.type === 'direct_in') dBankSum += r.amount;
            });
            if(new Date(dStr).getMonth() === month && new Date(dStr).getFullYear() === year) { 
                mInc += dInc; mExp += dExp;
                records.filter(r => r.date === dStr).forEach(r => {
                    if(r.type === 'tobank' || r.type === 'direct_in') mBnk += r.amount;
                    if(r.type === 'frombank') mBnk -= r.amount;
                });
            }
            dayDiv.innerHTML = `<span class="day-num">${d}</span><div class="day-info">
                ${dInc > 0 ? `<span class="cal-inc">+${dInc}</span>` : ''}
                ${dExp > 0 ? `<span class="cal-exp">-${dExp}</span>` : ''}
                ${dBankSum > 0 ? `<span class="cal-bnk">🏦${dBankSum}</span>` : ''}</div>`;
            cal.appendChild(dayDiv);
        }
        document.getElementById('totalBalance').innerText = current.wallet.toLocaleString() + "원";
        document.getElementById('bankBalance').innerText = current.bank.toLocaleString() + "원";
        document.getElementById('mTotalInc').innerText = mInc.toLocaleString() + "원";
        document.getElementById('mTotalExp').innerText = mExp.toLocaleString() + "원";
        document.getElementById('mTotalBnk').innerText = mBnk.toLocaleString() + "원";
    }
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    window.onload = render;
</script>
</body>
</html>
