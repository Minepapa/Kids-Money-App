<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>꿈나무 비밀 금고</title>
    <style>
        :root { --primary: #4a90e2; --income: #2ecc71; --expense: #e74c3c; --bank: #f1c40f; --bg: #fdfbff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nanum Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 8px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 12px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* 사용자 섹션 및 이름 입력창 숨김 */
        .user-section { text-align: center; margin-bottom: 8px; position: relative; }
        #nameInputZone { display: none; margin-bottom: 10px; background: #f0f4f8; padding: 10px; border-radius: 12px; }
        #userName { border: none; border-bottom: 2px solid var(--primary); font-size: 14px; text-align: center; outline: none; width: 80px; background: transparent; }
        
        h2 { color: #333; margin: 4px 0; font-size: 17px; display: inline-block; vertical-align: middle; }
        .money-trigger { cursor: pointer; user-select: none; font-size: 18px; vertical-align: middle; margin-left: 5px; transition: transform 0.1s; }
        .money-trigger:active { transform: scale(1.3); }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .dash-box { background: #fff; padding: 10px; border-radius: 15px; border: 1px solid #eee; text-align: center; cursor: pointer; user-select: none; }
        .dash-box.bank { border: 2px solid var(--bank); background: #fffdf5; transition: background 0.2s; }
        .dash-box.bank:active { background: #fff4d1; }
        .dash-box.wallet { border: 2px solid var(--primary); background: #f5faff; }
        .label { font-size: 10px; color: #666; display: block; margin-bottom: 2px; font-weight: bold; }
        .value { font-weight: 800; font-size: 14px; display: block; }
        .rate-info { font-size: 9px; color: #d4ac0d; margin-top: 3px; font-weight: bold; }

        .calendar-header { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 8px; }
        .calendar-header h3 { font-size: 14px; margin: 0; }
        .calendar-header button { padding: 4px 8px; font-size: 10px; background: #eee; border: none; border-radius: 6px; cursor: pointer; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; border: 1px solid #eee; background: #eee; border-radius: 10px; overflow: hidden; }
        .day-head { background: #f1f1f1; padding: 4px; text-align: center; font-size: 9px; font-weight: bold; }
        .day { background: white; min-height: 50px; padding: 2px; font-size: 8px; cursor: pointer; }
        .day.today { background: #fff9e6; }
        .day-num { font-weight: bold; color: #333; }

        .input-group { background: #f8f9fa; padding: 12px; border-radius: 18px; border: 1px solid #eee; margin-top: 10px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
        input, select, button { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 12px; outline: none; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }

        .detail-view { margin-top: 10px; display: none; background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 15px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 11px; }

        /* 모달 스타일 */
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 280px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .bank-btn { padding: 12px; margin: 5px 0; width: 100%; border-radius: 10px; border: 1px solid #ddd; background: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="customModal"><div class="modal-content" id="modalBody"></div></div>

<div class="container">
    <div class="user-section">
        <div id="nameInputZone">
            <input type="text" id="userName" placeholder="이름 입력">
            <button onclick="updateName()" style="width:auto; padding:5px 10px;">저장</button>
        </div>
        <h2 id="appTitle"><span id="nameDisplay">OO</span>의 비밀 금고</h2>
        <span class="money-trigger" id="nameTrigger" onmousedown="startTimer('name')" onmouseup="stopTimer('name')" ontouchstart="startTimer('name')" ontouchend="stopTimer('name')">💰</span>
    </div>

    <div class="dashboard">
        <div class="dash-box bank" id="dadVault" 
             onmousedown="startTimer('vault')" onmouseup="stopTimer('vault')" 
             ontouchstart="startTimer('vault')" ontouchend="stopTimer('vault')">
            <span class="label">👨‍💼 아빠 금고</span>
            <span class="value" id="bankBalance">0원</span>
            <span class="rate-info" id="rateDisplay">연이율: 0%</span>
        </div>
        <div class="dash-box wallet">
            <span class="label">💵 남은 용돈</span>
            <span class="value" id="totalBalance">0원</span>
        </div>
    </div>

    <div class="calendar-header">
        <button onclick="changeMonth(-1)">◀</button>
        <h3 id="currentMonthStr">2026년 3월</h3>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendar"></div>

    <div id="detailView" class="detail-view">
        <h4 id="selectedDateStr" style="margin:0 0 8px 0; font-size: 12px; color: var(--primary);">📍 상세 내역</h4>
        <div id="dayList"></div>
    </div>

    <div class="input-group">
        <div class="input-row">
            <input type="date" id="date">
            <select id="type">
                <option value="expense">📉 지출 (나간 돈)</option>
                <option value="income">📈 수입 (들어온 돈)</option>
                <option value="tobank">🏦 금고로 보내기</option>
            </select>
        </div>
        <div class="input-row">
            <input type="text" id="memo" placeholder="무엇을 했나요?">
            <input type="number" id="amount" placeholder="얼마인가요?">
        </div>
        <button onclick="addRecord()">기록하기</button>
    </div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('moneyRecords')) || [];
    let settings = JSON.parse(localStorage.getItem('vaultSettings')) || {
        userName: "OO",
        interestRate: 0,
        lastUpdate: new Date().getTime()
    };
    
    let viewDate = new Date();
    let timers = {};

    // --- 타이머 기능 (길게 누르기 감지) ---
    function startTimer(type) {
        const duration = type === 'name' ? 3000 : 2000; // 이름은 3초, 금고는 2초
        timers[type] = setTimeout(() => {
            if(type === 'name') {
                document.getElementById('nameInputZone').style.display = 'block';
            } else {
                openVaultMenu();
            }
        }, duration);
    }
    function stopTimer(type) { clearTimeout(timers[type]); }

    // --- 이름 관리 ---
    function updateName() {
        const newName = document.getElementById('userName').value;
        if(newName) {
            settings.userName = newName;
            saveSettings();
            render();
            document.getElementById('nameInputZone').style.display = 'none';
        }
    }

    // --- 아빠 금고 메뉴 ---
    function openVaultMenu() {
        const html = `
            <h3 style="margin-bottom:15px; font-size:16px;">🏦 아빠 금고 관리</h3>
            <button class="bank-btn" onclick="quickBank('direct_in')">💰 바로 입금</button>
            <button class="bank-btn" onclick="quickBank('withdraw')">💸 바로 출금</button>
            <div style="background:#fff4e5; padding:10px; border-radius:10px; margin:10px 0;">
                <label style="font-size:11px; font-weight:bold; color:#d4ac0d;">연평균 이자율 설정 (%)</label>
                <input type="number" id="rateInput" value="${settings.interestRate}" step="0.1" style="margin-top:5px;">
                <button onclick="updateRate()" style="background:#f39c12; margin-top:5px; height:30px; font-size:11px;">이자율 적용</button>
            </div>
            <button onclick="closeModal()" style="background:#eee; color:#333; margin-top:5px;">닫기</button>
        `;
        showModal(html);
    }

    function updateRate() {
        const rate = parseFloat(document.getElementById('rateInput').value);
        settings.interestRate = isNaN(rate) ? 0 : rate;
        saveSettings();
        render();
        closeModal();
    }

    // --- 이자 계산 로직 (매일 복리 반영) ---
    function processInterest() {
        const now = new Date().getTime();
        const diffDays = Math.floor((now - settings.lastUpdate) / (1000 * 60 * 60 * 24));
        
        if (diffDays >= 1 && settings.interestRate > 0) {
            let { bank } = calculateBalances();
            if (bank > 0) {
                const dailyRate = (settings.interestRate / 100) / 365;
                const newBalance = bank * Math.pow((1 + dailyRate), diffDays);
                const interestEarned = Math.floor(newBalance - bank);

                if (interestEarned > 0) {
                    records.push({
                        id: Date.now(),
                        date: new Date().toISOString().split('T')[0],
                        type: 'direct_in',
                        memo: '✨ 아빠 금고 이자 보너스',
                        amount: interestEarned
                    });
                    localStorage.setItem('moneyRecords', JSON.stringify(records));
                }
            }
            settings.lastUpdate = now;
            saveSettings();
        }
    }

    // --- 핵심 데이터 처리 ---
    function calculateBalances() {
        let wallet = 0, bank = 0;
        records.forEach(r => {
            if(r.type === 'income') wallet += r.amount; 
            else if(r.type === 'expense') wallet -= r.amount;
            else if(r.type === 'tobank') { wallet -= r.amount; bank += r.amount; }
            else if(r.type === 'frombank') { wallet += r.amount; bank -= r.amount; }
            else if(r.type === 'direct_in') bank += r.amount;
        });
        return { wallet, bank };
    }

    function addRecord() {
        const date = document.getElementById('date').value;
        const type = document.getElementById('type').value;
        const memo = document.getElementById('memo').value;
        const amount = parseInt(document.getElementById('amount').value);

        if(!date || !memo || isNaN(amount)) return alert("모든 칸을 채워주세요!");
        
        const { wallet } = calculateBalances();
        if((type === 'expense' || type === 'tobank') && amount > wallet) return alert("남은 용돈이 부족해요!");

        records.push({ id: Date.now(), date, type, memo, amount });
        localStorage.setItem('moneyRecords', JSON.stringify(records));
        render();
        showDetail(date);
    }

    function quickBank(action) {
        closeModal();
        const amount = parseInt(prompt(action === 'withdraw' ? "출금할 금액을 입력하세요:" : "입금할 금액을 입력하세요:"));
        if(isNaN(amount) || amount <= 0) return;

        const today = new Date().toISOString().split('T')[0];
        if(action === 'withdraw') {
            const { bank } = calculateBalances();
            if(amount > bank) return alert("금고에 돈이 부족해요!");
            records.push({ id: Date.now(), date: today, type: 'frombank', memo: '금고에서 꺼냄', amount });
        } else {
            records.push({ id: Date.now(), date: today, type: 'direct_in', memo: '금고에 바로 넣음', amount });
        }
        localStorage.setItem('moneyRecords', JSON.stringify(records));
        render();
    }

    // --- UI 렌더링 ---
    function render() {
        processInterest();
        document.getElementById('nameDisplay').innerText = settings.userName;
        document.getElementById('userName').value = settings.userName;
        document.getElementById('rateDisplay').innerText = `연이율: ${settings.interestRate}%`;

        const { wallet, bank } = calculateBalances();
        document.getElementById('totalBalance').innerText = wallet.toLocaleString() + "원";
        document.getElementById('bankBalance').innerText = bank.toLocaleString() + "원";

        const year = viewDate.getFullYear(), month = viewDate.getMonth();
        document.getElementById('currentMonthStr').innerText = `${year}년 ${month + 1}월`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        
        const cal = document.getElementById('calendar'); cal.innerHTML = "";
        ['일','월','화','수','목','금','토'].forEach(d => {
            const h = document.createElement('div'); h.className='day-head'; h.innerText=d; cal.appendChild(h);
        });

        for(let i=0; i<firstDay; i++) cal.appendChild(document.createElement('div')).className='day';
        for(let d=1; d<=lastDate; d++) {
            const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day' + (dStr === new Date().toISOString().split('T')[0] ? ' today' : '');
            dayDiv.onclick = () => showDetail(dStr);
            dayDiv.innerHTML = `<span class="day-num">${d}</span>`;
            cal.appendChild(dayDiv);
        }
    }

    function showDetail(dateStr) {
        document.getElementById('date').value = dateStr;
        const dayRecords = records.filter(r => r.date === dateStr);
        const detailView = document.getElementById('detailView');
        const dayList = document.getElementById('dayList');
        
        detailView.style.display = 'block';
        document.getElementById('selectedDateStr').innerText = "📍 " + dateStr;
        dayList.innerHTML = dayRecords.length ? "" : "<p style='font-size:10px; color:#999'>내역이 없습니다.</p>";
        
        dayRecords.forEach(r => {
            const div = document.createElement('div');
            div.className = 'list-item';
            const color = (r.type === 'income' || r.type === 'frombank') ? 'var(--income)' : (r.type === 'expense' ? 'var(--expense)' : 'var(--bank)');
            div.innerHTML = `<span><b>${r.memo}</b></span> <b style="color:${color}">${r.amount.toLocaleString()}원</b>`;
            dayList.appendChild(div);
        });
    }

    function showModal(html) {
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('customModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }
    function changeMonth(v) { viewDate.setMonth(viewDate.getMonth() + v); render(); }
    function saveSettings() { localStorage.setItem('vaultSettings', JSON.stringify(settings)); }

    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    window.onload = render;
</script>

</body>
</html>
